<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Head -->
  <ellipse cx="50" cy="45" rx="38" ry="36" fill="#67D2E0"/>
  <!-- Ears -->
  <ellipse cx="20" cy="14" rx="6" ry="11" fill="#67D2E0"/>
  <ellipse cx="20" cy="14" rx="3" ry="8" fill="#E0D5B3"/>
  <ellipse cx="80" cy="14" rx="6" ry="11" fill="#67D2E0"/>
  <ellipse cx="80" cy="14" rx="3" ry="8" fill="#E0D5B3"/>
  <!-- Eyes (white) -->
  <circle cx="36" cy="40" r="13" fill="white"/>
  <circle cx="64" cy="40" r="13" fill="white"/>
  <!-- Pupils -->
  <circle cx="39" cy="40" r="6.5" fill="#333"/>
  <circle cx="67" cy="40" r="6.5" fill="#333"/>
  <!-- Eye shine -->
  <circle cx="42" cy="37" r="2.5" fill="white"/>
  <circle cx="70" cy="37" r="2.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="54" rx="4" ry="3" fill="#C4A96A"/>
  <!-- Smile -->
  <path d="M 40 60 Q 50 69 60 60" fill="none" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Teeth -->
  <rect x="46" y="60" width="8" height="6" rx="1" fill="white"/>
  <line x1="50" y1="60" x2="50" y2="66" stroke="#ddd" stroke-width="0.5"/>
  <!-- Body hint -->
  <ellipse cx="50" cy="85" rx="30" ry="18" fill="#67D2E0"/>
  <ellipse cx="50" cy="88" rx="20" ry="12" fill="#C1E8ED"/>
</svg>
